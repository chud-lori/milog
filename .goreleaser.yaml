# goreleaser config — cross-compile milog-web + milog-tui + ship tarball
# with the bash bundle.
#
# Trigger: push a tag matching `v*` → .github/workflows/release.yml runs
# goreleaser, uploads artifacts to the matching GitHub Release.
#
# Test locally without tagging:
#   goreleaser release --snapshot --clean
#
# Docs: https://goreleaser.com/customization/
version: 2

project_name: milog

before:
  hooks:
    # Regenerate the bash bundle so the tarball carries a milog.sh
    # whose MILOG_VERSION line matches the Go binaries' stamp.
    - bash build.sh

builds:
  # --- milog-web: HTTP + SSE dashboard daemon ---
  - id: milog-web
    main: ./cmd/milog-web
    dir: go
    binary: milog-web
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Only build arm64 for linux (most VPS) and darwin (Apple Silicon);
    # skip the rarer combos to keep the artifact list tight.
    ignore:
      - goos: darwin
        goarch: 386
    ldflags:
      - -s -w -X main.buildVersion={{.Version}}
  # --- milog-tui: bubbletea terminal UI ---
  - id: milog-tui
    main: ./cmd/milog-tui
    dir: go
    binary: milog-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.buildVersion={{.Version}}

archives:
  # One tarball per (os, arch) carrying the Go binaries + bash bundle +
  # install.sh + LICENSE + README. install.sh's curl-pipe path can
  # fetch just the raw binaries, but distros + manual users who prefer
  # a single download get everything.
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - milog.sh
      - install.sh
      - README.md
      - SERVER_HARDENING.md
      - docs/*.md
      # LICENSE is omitted while the project doesn't ship one; re-add
      # `LICENSE*` here once a LICENSE file exists in the repo root.

# Native packages — `.deb` (Debian/Ubuntu), `.rpm` (Fedora/Rocky/RHEL),
# `.apk` (Alpine). Built once, attached to the same Release as the
# tarballs. Users get `apt install` / `dnf install` flow; the curl-pipe
# install.sh path stays for distros without a packaging story.
#
# What ends up on disk:
#   /usr/bin/milog                                     — bash entry point
#   /usr/bin/milog-web                                 — Go SSE daemon
#   /usr/bin/milog-tui                                 — Go bubbletea TUI
#   /usr/share/bash-completion/completions/milog       — bash completions
#   /usr/share/zsh/site-functions/_milog               — zsh completions
#   /usr/share/fish/vendor_completions.d/milog.fish    — fish completions
#   /usr/share/doc/milog/{README.md,SERVER_HARDENING.md,docs/}
#
# Runtime deps mirror what milog.sh actually uses across modes. Each
# format names them with that distro's package conventions. `gawk` is
# preferred for fflush() in awk one-liners; `mawk` is acceptable on
# Debian/Ubuntu — listed as alternatives where the format supports it.
nfpms:
  - id: milog
    package_name: milog
    ids:
      - milog-web
      - milog-tui
    formats: [deb, rpm, apk]
    vendor: chud-lori
    homepage: https://github.com/chud-lori/milog
    maintainer: chud-lori <noreply@github.com>
    description: |-
      Single-host nginx + system + app-error monitor with alerts.
      One bash bundle plus optional Go binaries for the SSE web
      dashboard and the bubbletea TUI. Source-aware tail/grep/search
      across nginx access logs, systemd journal, docker container
      logs, and arbitrary text logs.
    section: utils
    priority: optional
    bindir: /usr/bin
    contents:
      - src: milog.sh
        dst: /usr/bin/milog
        file_info:
          mode: 0755
      - src: completions/milog.bash
        dst: /usr/share/bash-completion/completions/milog
      - src: completions/_milog
        dst: /usr/share/zsh/site-functions/_milog
      - src: completions/milog.fish
        dst: /usr/share/fish/vendor_completions.d/milog.fish
      - src: man/milog.1
        dst: /usr/share/man/man1/milog.1
      - src: README.md
        dst: /usr/share/doc/milog/README.md
      - src: SERVER_HARDENING.md
        dst: /usr/share/doc/milog/SERVER_HARDENING.md
      - src: docs
        dst: /usr/share/doc/milog/docs
        type: tree
    overrides:
      deb:
        dependencies:
          - bash
          - coreutils
          - curl
          - gawk | mawk
      rpm:
        dependencies:
          - bash
          - coreutils
          - curl
          - gawk
      apk:
        dependencies:
          - bash
          - coreutils
          - curl
          - gawk

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

# Release notes are auto-generated from commits between the previous
# tag and this one. Filters cut the noise from merge commits + chores.
changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge pull request"
      - "^Merge branch"
      - "^chore:"
      - "^docs: typo"

# Don't auto-publish — the workflow creates the Release and goreleaser
# attaches to it, so a human still flips it from draft → published.
release:
  draft: true
  prerelease: auto
